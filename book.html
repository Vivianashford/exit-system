<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRANSFERABLE - Jean Louis Hardy</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23C9A84C'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='Georgia' fill='%230A0A0A' font-weight='bold'%3ET%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF7F0;--paper:#F5F1EA;--ink:#1a1a1a;--ink-light:#4a4540;
  --gold:#B8943E;--gold-dark:#96782E;--gold-light:#D4B96A;
  --spine:#2a2420;--page-shadow:rgba(0,0,0,0.08);
  --reading-width:680px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Source Serif 4',Georgia,serif;
  background:#E8E4DE;color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;height:100vh;
  user-select:none;-webkit-user-select:none;
}

/* ── Book Shell ── */
.book-shell{
  display:flex;flex-direction:column;
  height:100vh;background:#E8E4DE;
}

/* ── Top Bar ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--spine);
  border-bottom:2px solid var(--gold-dark);
  flex-shrink:0;z-index:100;
}
.top-bar .book-title{
  font-family:'Playfair Display',serif;font-size:14px;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;
  font-weight:600;
}
.top-bar .author{
  font-family:'DM Sans',sans-serif;font-size:12px;
  color:#8a8078;letter-spacing:0.5px;
}
.top-bar .progress-wrap{
  display:flex;align-items:center;gap:10px;
}
.progress-bar{
  width:120px;height:3px;background:rgba(255,255,255,0.1);
  border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--gold);border-radius:2px;
  transition:width 0.4s ease;
}
.progress-pct{
  font-family:'DM Sans',sans-serif;font-size:11px;color:#6a6560;
}

/* ── Page Area ── */
.page-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;position:relative;
}

/* ── The Book ── */
.book{
  width:100%;max-width:var(--reading-width);
  height:100%;max-height:880px;
  position:relative;perspective:1800px;
}

.page{
  position:absolute;inset:0;
  background:var(--paper);
  border-radius:2px 8px 8px 2px;
  box-shadow:
    4px 4px 20px var(--page-shadow),
    1px 0 0 rgba(0,0,0,0.05),
    inset -2px 0 8px rgba(0,0,0,0.02);
  padding:48px 56px 60px 56px;
  overflow-y:auto;overflow-x:hidden;
  transition:transform 0.5s ease, opacity 0.3s ease;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:rgba(184,148,62,0.2) transparent;
}
.page::-webkit-scrollbar{width:4px}
.page::-webkit-scrollbar-track{background:transparent}
.page::-webkit-scrollbar-thumb{background:rgba(184,148,62,0.25);border-radius:2px}

/* Spine edge */
.page::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:linear-gradient(to right,rgba(0,0,0,0.06),transparent);
}

/* Page texture */
.page::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  border-radius:inherit;
}

/* Page turn animations */
.page{transform-origin:left center;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1),opacity 0.4s ease,box-shadow 0.6s ease}
.page.exit-left{
  transform:perspective(1800px) rotateY(-90deg);
  opacity:0;
  box-shadow:-8px 4px 30px rgba(0,0,0,0.2);
}
.page.exit-right{
  transform:perspective(1800px) rotateY(45deg);
  opacity:0;
  box-shadow:8px 4px 30px rgba(0,0,0,0.15);
  transform-origin:right center;
}
.page.enter{
  transform:perspective(1800px) rotateY(0deg);
  opacity:1;
  box-shadow:4px 4px 20px var(--page-shadow),1px 0 0 rgba(0,0,0,0.05),inset -2px 0 8px rgba(0,0,0,0.02);
}
/* Entering from the left (going back) */
.page.enter-from-left{
  transform:perspective(1800px) rotateY(-45deg);
  opacity:0;
  transform-origin:left center;
}
/* Entering from the right (going forward) */
.page.enter-from-right{
  transform:perspective(1800px) rotateY(45deg);
  opacity:0;
  transform-origin:right center;
}

/* ── Typography ── */
.page-content{position:relative;z-index:1;user-select:text;-webkit-user-select:text;}

.chapter-label{
  font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;font-weight:600;
}
.chapter-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,4vw,36px);font-weight:700;
  color:var(--ink);line-height:1.2;margin-bottom:32px;
}
.chapter-title em{font-style:italic;color:var(--gold-dark)}

.chapter-divider{
  width:60px;height:2px;background:var(--gold);
  margin:0 0 32px;border-radius:1px;
}

.book-paragraph{
  font-size:17px;line-height:1.85;color:var(--ink-light);
  margin-bottom:18px;text-align:justify;
  hyphens:auto;-webkit-hyphens:auto;
}
.book-paragraph:first-of-type::first-letter{
  font-family:'Playfair Display',serif;
  font-size:3.2em;float:left;line-height:0.8;
  margin:4px 10px 0 0;color:var(--gold-dark);
  font-weight:700;
}

/* Title page */
.title-page{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;height:100%;
}
.title-page .tp-label{
  font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:24px;
}
.title-page h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,6vw,52px);font-weight:700;
  color:var(--ink);line-height:1.1;margin-bottom:12px;
  letter-spacing:-0.5px;
}
.title-page .tp-sub{
  font-family:'Playfair Display',serif;
  font-size:16px;font-style:italic;color:var(--ink-light);
  margin-bottom:40px;max-width:380px;line-height:1.5;
}
.title-page .tp-rule{
  width:60px;height:2px;background:var(--gold);
  margin:0 auto 24px;
}
.title-page .tp-author{
  font-family:'DM Sans',sans-serif;font-size:14px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ink);font-weight:600;margin-bottom:6px;
}
.title-page .tp-role{
  font-family:'Source Serif 4',serif;font-size:14px;
  color:var(--ink-light);font-style:italic;
}

/* Part page */
.part-page{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;height:100%;
}
.part-page .part-label{
  font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:16px;
}
.part-page h2{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,40px);font-weight:700;
  color:var(--ink);line-height:1.2;
}

/* ── Nav Buttons ── */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:80px;
  background:rgba(42,36,32,0.06);
  border:none;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;z-index:50;
  opacity:1;
}
.nav-btn.hidden{opacity:0;pointer-events:none}
.nav-btn:hover{background:rgba(42,36,32,0.12)}
.nav-btn svg{width:20px;height:20px;stroke:var(--ink-light);fill:none;stroke-width:2}
.nav-prev{left:8px}
.nav-next{right:8px}
.nav-btn:disabled{opacity:0.2;cursor:default}

/* ── Bottom Bar ── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;background:var(--spine);
  border-top:1px solid rgba(184,148,62,0.15);
  flex-shrink:0;
}
.page-num{
  font-family:'DM Sans',sans-serif;font-size:12px;color:#6a6560;
}
.chapter-nav{
  font-family:'DM Sans',sans-serif;font-size:12px;color:#8a8078;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:color 0.2s;
}
.chapter-nav:hover{color:var(--gold)}
.chapter-nav svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Table of Contents Overlay ── */
.toc-overlay{
  position:fixed;inset:0;background:rgba(26,22,18,0.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:200;display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.3s;
}
.toc-overlay.active{display:flex;opacity:1}
.toc-panel{
  background:var(--paper);border-radius:12px;
  max-width:480px;width:90%;max-height:80vh;
  overflow-y:auto;padding:40px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.toc-panel h3{
  font-family:'Playfair Display',serif;font-size:22px;
  color:var(--ink);margin-bottom:24px;font-weight:700;
}
.toc-item{
  display:flex;align-items:baseline;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);
  cursor:pointer;transition:color 0.2s;
}
.toc-item:hover{color:var(--gold-dark)}
.toc-item:last-child{border-bottom:none}
.toc-num{
  font-family:'DM Sans',sans-serif;font-size:11px;
  color:var(--gold);min-width:28px;font-weight:600;
}
.toc-label{
  font-size:15px;color:var(--ink-light);line-height:1.4;flex:1;
}
.toc-item.active .toc-label{color:var(--gold-dark);font-weight:600}
.toc-close{
  position:absolute;top:20px;right:20px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.1);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.toc-close svg{width:16px;height:16px;stroke:var(--cream);fill:none;stroke-width:2}

/* ── Font Size Controls ── */
.font-controls{
  display:flex;align-items:center;gap:8px;
}
.font-btn{
  width:28px;height:28px;border-radius:4px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  color:#8a8078;font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;font-weight:600;
}
.font-btn:hover{background:rgba(255,255,255,0.15);color:var(--gold)}

/* ── Dedication Page ── */
.dedication-page{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;height:100%;
  padding:40px 20px;
}
.dedication-page .ded-to{
  font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:20px;font-weight:600;
}
.dedication-page .ded-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,42px);font-weight:700;
  color:var(--ink);line-height:1.2;margin-bottom:28px;
}
.dedication-page .ded-rule{
  width:60px;height:2px;background:var(--gold);
  margin:0 auto 28px;border-radius:1px;
}
.dedication-page .ded-message{
  font-family:'Source Serif 4',serif;
  font-size:17px;line-height:1.8;color:var(--ink-light);
  max-width:400px;font-style:italic;margin-bottom:36px;
}
.dedication-page .ded-signature{
  font-family:'Playfair Display',serif;
  font-size:24px;font-style:italic;color:var(--ink);
  margin-bottom:4px;
}
.dedication-page .ded-title{
  font-family:'DM Sans',sans-serif;font-size:12px;
  color:var(--ink-light);letter-spacing:0.5px;
}

/* ── Responsive ── */
@media(max-width:768px){
  .page{padding:32px 28px 48px 28px;border-radius:0}
  .book-paragraph{font-size:16px;line-height:1.8;text-align:left}
  .nav-btn{width:36px;height:60px}
  .nav-prev{left:4px}
  .nav-next{right:4px}
  .page-area{padding:8px}
  .title-page h1{font-size:32px}
  .top-bar{padding:10px 16px}
  .bottom-bar{padding:8px 16px}
  .progress-bar{width:80px}
}
@media(max-width:480px){
  .page{padding:24px 20px 40px 20px}
  .book-paragraph{font-size:15px}
  .chapter-title{font-size:24px}
}
</style>
</head>
<body>

<div class="book-shell">
  <!-- Top Bar -->
  <div class="top-bar">
    <div>
      <div class="book-title">Transferable</div>
      <div class="author">Jean Louis Hardy</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="font-controls">
        <button class="font-btn" onclick="adjustFont(-1)">A-</button>
        <button class="font-btn" onclick="adjustFont(1)">A+</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </div>
  </div>

  <!-- Page Area -->
  <div class="page-area">
    <button class="nav-btn nav-prev" id="prevBtn" onclick="prevPage()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="book">
      <div class="page enter" id="pageEl">
        <div class="page-content" id="pageContent"></div>
      </div>
    </div>

    <button class="nav-btn nav-next" id="nextBtn" onclick="nextPage()">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <span class="page-num" id="pageNum">Page 1</span>
    <div class="chapter-nav" onclick="toggleTOC()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <span id="chapterLabel">Contents</span>
    </div>
  </div>
</div>

<!-- TOC Overlay -->
<div class="toc-overlay" id="tocOverlay" onclick="if(event.target===this)toggleTOC()">
  <button class="toc-close" onclick="toggleTOC()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="toc-panel">
    <h3>Contents</h3>
    <div id="tocList"></div>
  </div>
</div>

<script>
let chapters = [];
let currentPage = 0;
let fontSize = 17;
let readerName = '';
const STORAGE_KEY = 'transferable-bookmark';

// Pull reader's name from URL params (?name=Rick or ?firstName=Rick)
const urlParams = new URLSearchParams(window.location.search);
readerName = urlParams.get('name') || urlParams.get('firstName') || urlParams.get('first') || '';
readerName = decodeURIComponent(readerName).trim();
// Capitalize first letter
if (readerName) readerName = readerName.charAt(0).toUpperCase() + readerName.slice(1).toLowerCase();

// Use name-specific bookmark so multiple readers don't overwrite each other
const bookmarkKey = readerName ? STORAGE_KEY + '-' + readerName.toLowerCase() : STORAGE_KEY;

// Load book content
fetch('book-content.json')
  .then(r => r.json())
  .then(data => {
    // Filter out stub chapters (< 50 words) except title/part pages
    let filtered = data.filter((ch, i) => {
      if (i === 0) return true; // title
      const words = ch.content.reduce((a, p) => a + p.split(' ').length, 0);
      const isPart = ch.title.toLowerCase().startsWith('part ');
      return words > 30 || isPart;
    });
    
    // Insert dedication page at the start if we have a name
    if (readerName) {
      filtered.unshift({
        title: '__dedication__',
        content: [],
        _dedication: true
      });
    }
    
    chapters = filtered;
    
    // Load saved position
    const saved = localStorage.getItem(bookmarkKey);
    if (saved) currentPage = Math.min(parseInt(saved), chapters.length - 1);
    
    buildTOC();
    renderPage();
  });

function buildTOC() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'toc-item' + (i === currentPage ? ' active' : '');
    
    let num = '';
    const t = ch.title;
    if (t.match(/^(CHAPTER|Chapter)\s+\d/i)) {
      num = t.match(/\d+/)[0];
    } else if (t.match(/^Part /i)) {
      num = '\u2022';
    } else if (i === 0) {
      num = '\u2022';
    } else {
      num = '\u2022';
    }
    
    item.innerHTML = `<span class="toc-num">${num}</span><span class="toc-label">${ch.title}</span>`;
    item.onclick = () => { goToPage(i); toggleTOC(); };
    list.appendChild(item);
  });
}

function renderPage() {
  const page = document.getElementById('pageContent');
  const ch = chapters[currentPage];
  if (!ch) return;
  
  let html = '';
  const title = ch.title;
  const isPart = title.toLowerCase().startsWith('part ');
  const isDedication = ch._dedication;
  const isTitle = !isDedication && (currentPage === 0 || (readerName && currentPage === 1));
  
  if (isDedication) {
    // Personalized dedication page
    html = `<div class="dedication-page">
      <p class="ded-to">For You</p>
      <p class="ded-name">${readerName},</p>
      <div class="ded-rule"></div>
      <p class="ded-message">I wrote this book because I watched too many great builders lose what they earned. I hope it helps you protect yours.</p>
      <p class="ded-signature">Jean Louis Hardy</p>
      <p class="ded-title">Founder, The Arena Partners</p>
    </div>`;
  } else if (isTitle) {
    // Title page - show the actual book cover
    html = `<div class="title-page" style="padding:0;overflow:hidden;">
      <img src="book-cover.png" alt="TRANSFERABLE by Jean Louis Hardy" style="width:100%;height:100%;object-fit:contain;">
    </div>`;
  } else if (isPart) {
    // Part divider page
    const parts = title.split(':');
    html = `<div class="part-page">
      <p class="part-label">${parts[0].trim()}</p>
      <h2>${parts.slice(1).join(':').trim() || ''}</h2>
    </div>`;
  } else {
    // Regular chapter
    let label = '';
    let heading = title;
    
    const chMatch = title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
    if (chMatch) {
      label = `Chapter ${chMatch[2]}`;
      heading = chMatch[3];
    } else if (title.match(/^INTRODUCTION/i)) {
      label = 'Introduction';
      heading = title.replace(/^INTRODUCTION:\s*/i, '');
    } else if (title.match(/^Author/i)) {
      label = '';
      heading = title;
    }
    
    html = `${label ? `<p class="chapter-label">${label}</p>` : ''}
      <h1 class="chapter-title">${heading}</h1>
      <div class="chapter-divider"></div>`;
    
    ch.content.forEach(p => {
      // Skip metadata lines
      if (p.startsWith('---') || p.startsWith('Word Count:') || p.startsWith('[End Of')) return;
      if (p.startsWith('End Of Part')) return;
      html += `<p class="book-paragraph">${p}</p>`;
    });
  }
  
  page.innerHTML = html;
  
  // Scroll to top
  document.getElementById('pageEl').scrollTop = 0;
  
  // Update UI
  updateUI();
  
  // Save position
  localStorage.setItem(bookmarkKey, currentPage);
}

function updateUI() {
  const pct = Math.round((currentPage / (chapters.length - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('pageNum').textContent = `Page ${currentPage + 1} of ${chapters.length}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === chapters.length - 1;
  
  // Update chapter label
  const ch = chapters[currentPage];
  const chMatch = ch.title.match(/^(CHAPTER|Chapter)\s+(\d+)/i);
  document.getElementById('chapterLabel').textContent = chMatch ? `Ch. ${chMatch[2]}` : 'Contents';
  
  // Update TOC active state
  document.querySelectorAll('.toc-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentPage);
  });
}

function nextPage() {
  if (currentPage >= chapters.length - 1 || isFlipping) return;
  isFlipping = true;
  const page = document.getElementById('pageEl');
  page.style.transformOrigin = 'left center';
  page.classList.remove('enter');
  page.classList.add('exit-left');
  setTimeout(() => {
    currentPage++;
    renderPage();
    page.classList.remove('exit-left');
    page.style.transformOrigin = 'right center';
    page.classList.add('enter-from-right');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        page.classList.remove('enter-from-right');
        page.classList.add('enter');
        setTimeout(() => { isFlipping = false; }, 300);
      });
    });
  }, 350);
}

function prevPage() {
  if (currentPage <= 0 || isFlipping) return;
  isFlipping = true;
  const page = document.getElementById('pageEl');
  page.style.transformOrigin = 'right center';
  page.classList.remove('enter');
  page.classList.add('exit-right');
  setTimeout(() => {
    currentPage--;
    renderPage();
    page.classList.remove('exit-right');
    page.style.transformOrigin = 'left center';
    page.classList.add('enter-from-left');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        page.classList.remove('enter-from-left');
        page.classList.add('enter');
        setTimeout(() => { isFlipping = false; }, 300);
      });
    });
  }, 350);
}

function goToPage(i) {
  currentPage = i;
  const page = document.getElementById('pageEl');
  page.classList.remove('enter', 'exit-left', 'exit-right');
  page.classList.add('enter');
  renderPage();
}

function adjustFont(delta) {
  fontSize = Math.max(14, Math.min(22, fontSize + delta));
  document.querySelectorAll('.book-paragraph').forEach(p => {
    p.style.fontSize = fontSize + 'px';
  });
}

function toggleTOC() {
  document.getElementById('tocOverlay').classList.toggle('active');
}

let isFlipping = false;

// Hide arrows when scrolling the page content
let scrollTimer;
const pageEl = document.getElementById('pageEl');
pageEl.addEventListener('scroll', () => {
  document.getElementById('prevBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    document.getElementById('prevBtn').classList.remove('hidden');
    document.getElementById('nextBtn').classList.remove('hidden');
  }, 1200);
}, {passive: true});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
  if (e.key === 'Escape') { document.getElementById('tocOverlay').classList.remove('active'); }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff < 0) nextPage();
    else prevPage();
  }
}, {passive:true});
</script>
