<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRANSFERABLE - Jean Louis Hardy | The Arena Partners</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23C9A84C'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='Georgia' fill='%230A0A0A' font-weight='bold'%3ET%3C/text%3E%3C/svg%3E">

<!-- SEO + Open Graph -->
<meta name="description" content="TRANSFERABLE by Jean Louis Hardy. The playbook behind every premium business exit.">
<meta property="og:title" content="TRANSFERABLE - Read the Book">
<meta property="og:description" content="Why the best operators own the least valuable businesses. By Jean Louis Hardy, Founder of The Arena Partners.">
<meta property="og:image" content="https://thearenapartners.com/book-cover.png">
<meta property="og:url" content="https://thearenapartners.com/book.html">
<meta property="og:type" content="book">
<meta property="og:site_name" content="The Arena Partners">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TRANSFERABLE - Read the Book">
<meta name="twitter:description" content="Why the best operators own the least valuable businesses. By Jean Louis Hardy.">
<meta name="twitter:image" content="https://thearenapartners.com/book-cover.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#F5F1EA;--ink:#1a1a1a;--ink-light:#4a4540;
  --gold:#B8943E;--gold-dark:#96782E;--gold-light:#D4B96A;
  --spine:#2a2420;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Source Serif 4',Georgia,serif;
  background:#2a2420;color:var(--ink);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}

/* -- Top Bar -- */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:var(--spine);
  border-bottom:2px solid var(--gold-dark);flex-shrink:0;z-index:100;
}
.top-bar .title{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.top-bar .author{font-family:'DM Sans',sans-serif;font-size:11px;color:#8a8078}
.top-bar .controls{display:flex;align-items:center;gap:14px}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{width:100px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s}
.progress-pct{font-family:'DM Sans',sans-serif;font-size:11px;color:#6a6560}
.toc-btn{
  background:none;border:1px solid rgba(184,148,62,0.3);border-radius:4px;
  color:#8a8078;font-family:'DM Sans',sans-serif;font-size:11px;
  padding:4px 10px;cursor:pointer;transition:all 0.2s;
}
.toc-btn:hover{color:var(--gold);border-color:var(--gold)}

/* -- Book Container -- */
.book-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  background:radial-gradient(ellipse at center,#3a3430 0%,#2a2420 70%);
}
#bookContainer{position:relative}

/* -- Page Styles -- */
.book-page{
  background:var(--paper);
  padding:40px 48px;
  overflow-y:auto;
  font-family:'Source Serif 4',Georgia,serif;
}
.book-page.hard{background:#c4a85a}

/* Cover pages */
.cover-page{
  padding:0!important;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.cover-page img{width:100%;height:100%;object-fit:cover}

/* Welcome + TOC page */
.welcome-toc{padding:32px 36px!important}
.welcome-header{text-align:center;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.06);margin-bottom:14px}
.welcome-header .ded-to{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:600}
.welcome-header .ded-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:8px}
.welcome-header .ded-msg{font-family:'Source Serif 4',serif;font-size:13px;line-height:1.6;color:var(--ink-light);font-style:italic;max-width:360px;margin:0 auto 8px}
.welcome-header .ded-sig{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--ink)}
.welcome-header .ded-role{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink-light)}

.toc-list{list-style:none;padding:0;margin:0}
.toc-list li{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;transition:color 0.15s}
.toc-list li:hover{color:var(--gold-dark)}
.toc-list .toc-num{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--gold);min-width:20px;font-weight:600}
.toc-list .toc-label{font-size:12px;color:var(--ink-light);line-height:1.3;flex:1}
.toc-list .toc-dots{flex:1;border-bottom:1px dotted rgba(0,0,0,0.08);min-width:10px;align-self:center;margin:0 4px}
.toc-list li.part-entry{margin-top:8px}
.toc-list li.part-entry .toc-label{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--ink)}
.toc-section-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--ink);margin-bottom:8px;font-weight:700}

/* Chapter pages */
.chapter-label{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:600}
.part-header{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;opacity:0.7}
.chapter-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:20px}
.chapter-divider{width:50px;height:2px;background:var(--gold);margin:0 0 20px;border-radius:1px}
.book-paragraph{font-size:15px;line-height:1.8;color:var(--ink-light);margin-bottom:14px;text-align:justify;hyphens:auto;-webkit-hyphens:auto}
.book-paragraph:first-of-type::first-letter{font-family:'Playfair Display',serif;font-size:2.8em;float:left;line-height:0.8;margin:3px 8px 0 0;color:var(--gold-dark);font-weight:700}

/* -- Bottom Bar -- */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px;background:var(--spine);
  border-top:1px solid rgba(184,148,62,0.15);flex-shrink:0;
}
.page-info{font-family:'DM Sans',sans-serif;font-size:11px;color:#6a6560}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#8a8078;border-radius:4px;padding:6px 14px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;transition:all 0.2s;
}
.nav-btn:hover{color:var(--gold);border-color:var(--gold)}

/* -- TOC Overlay -- */
.toc-overlay{
  position:fixed;inset:0;background:rgba(26,22,18,0.92);
  backdrop-filter:blur(12px);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.toc-overlay.active{display:flex}
.toc-panel{
  background:var(--paper);border-radius:12px;
  max-width:440px;width:90%;max-height:80vh;
  overflow-y:auto;padding:32px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.toc-panel h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}
.toc-panel .toc-list li{padding:8px 0}
.toc-panel .toc-list .toc-label{font-size:14px}
.toc-panel .toc-list li.part-entry .toc-label{font-size:15px}
.toc-panel-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.1);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.toc-panel-close svg{width:14px;height:14px;stroke:#F5F1EA;fill:none;stroke-width:2}

@media(max-width:768px){
  .book-page{padding:28px 24px}
  .welcome-toc{padding:20px 20px!important}
  .book-paragraph{font-size:14px;text-align:left}
  .chapter-title{font-size:20px}
  .top-bar{padding:8px 12px}
  .bottom-bar{padding:6px 12px}
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="title">Transferable</div>
    <div class="author">Jean Louis Hardy</div>
  </div>
  <div class="controls">
    <button class="toc-btn" onclick="toggleTOC()">Contents</button>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>
</div>

<div class="book-area">
  <div id="bookContainer"></div>
</div>

<div class="bottom-bar">
  <span class="page-info" id="pageInfo">Page 1</span>
  <div class="nav-btns">
    <button class="nav-btn" onclick="flipPrev()">&larr; Prev</button>
    <button class="nav-btn" onclick="flipNext()">Next &rarr;</button>
  </div>
</div>

<!-- TOC Overlay -->
<div class="toc-overlay" id="tocOverlay" onclick="if(event.target===this)toggleTOC()">
  <button class="toc-panel-close" onclick="toggleTOC()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="toc-panel" id="tocPanel"></div>
</div>

<script>
let pageFlip = null;
let totalPages = 0;

// Reader name from URL
const urlParams = new URLSearchParams(window.location.search);
let readerName = urlParams.get('name') || urlParams.get('firstName') || '';
readerName = decodeURIComponent(readerName).trim();
if (readerName) readerName = readerName.charAt(0).toUpperCase() + readerName.slice(1).toLowerCase();
const bookmarkKey = 'transferable-bm' + (readerName ? '-' + readerName.toLowerCase() : '');

// Calculate book size based on viewport
function getBookSize() {
  const area = document.querySelector('.book-area');
  const h = area.clientHeight - 20;
  const w = Math.min(area.clientWidth - 40, h * 0.7); // book ratio ~0.7
  return { w: Math.floor(w), h: Math.floor(h) };
}

fetch('book-content.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    // Filter stubs
    let filtered = data.filter((ch, i) => {
      if (i === 0) return true;
      const words = ch.content.reduce((a, p) => a + p.split(' ').length, 0);
      const isPart = ch.title.toLowerCase().startsWith('part ');
      return isPart || words > 50;
    });

    // Build page data: merge parts into next chapter
    let pageData = [];
    let pendingPart = null;

    // Front cover
    pageData.push({ type: 'cover', src: 'book-cover.png', hard: true });

    // Welcome + TOC
    pageData.push({ type: 'welcome-toc' });

    // Chapters
    filtered.slice(1).forEach(ch => {
      const isPart = ch.title.toLowerCase().startsWith('part ');
      if (isPart) {
        pendingPart = ch.title;
      } else {
        pageData.push({ type: 'chapter', title: ch.title, content: ch.content, partHeader: pendingPart });
        pendingPart = null;
      }
    });

    // Back cover
    pageData.push({ type: 'cover', src: 'book-back-cover.png', hard: true });

    totalPages = pageData.length;

    // Build TOC data for overlay
    const tocData = [];
    pageData.forEach((p, idx) => {
      if (p.type === 'chapter') {
        tocData.push({ title: p.title, pageIdx: idx, partHeader: p.partHeader });
      }
    });

    // Create HTML pages
    const container = document.getElementById('bookContainer');
    pageData.forEach((pg, idx) => {
      const div = document.createElement('div');
      div.className = 'book-page' + (pg.hard ? ' hard' : '');
      if (pg.hard) div.setAttribute('data-density', 'hard');

      if (pg.type === 'cover') {
        div.classList.add('cover-page');
        div.innerHTML = `<img src="${pg.src}" alt="Cover">`;

      } else if (pg.type === 'welcome-toc') {
        div.classList.add('welcome-toc');
        let h = '';
        if (readerName) {
          h += `<div class="welcome-header">
            <p class="ded-to">For You</p>
            <p class="ded-name">${readerName},</p>
            <p class="ded-msg">I wrote this book because I watched too many great builders lose what they earned. I hope it helps you protect yours.</p>
            <p class="ded-sig">Jean Louis Hardy</p>
            <p class="ded-role">Founder, The Arena Partners</p>
          </div>`;
        } else {
          h += `<div class="welcome-header">
            <p class="ded-to">Welcome</p>
            <p class="ded-name" style="font-size:20px;">TRANSFERABLE</p>
            <p class="ded-msg">Why the best operators own the least valuable businesses.</p>
            <p class="ded-sig">Jean Louis Hardy</p>
            <p class="ded-role">Founder, The Arena Partners</p>
          </div>`;
        }

        h += '<p class="toc-section-title">Contents</p><ul class="toc-list">';
        tocData.forEach(entry => {
          const chMatch = entry.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
          let num = '', label = entry.title;
          if (chMatch) { num = chMatch[2]; label = chMatch[3]; }
          else if (entry.title.match(/^INTRODUCTION/i)) { label = entry.title.replace(/^INTRODUCTION:\s*/i, 'Introduction: '); }

          if (entry.partHeader) {
            h += `<li class="part-entry" onclick="goTo(${entry.pageIdx})"><span class="toc-label">${entry.partHeader}</span></li>`;
          }
          h += `<li onclick="goTo(${entry.pageIdx})"><span class="toc-num">${num}</span><span class="toc-label">${label}</span><span class="toc-dots"></span></li>`;
        });
        h += '</ul>';
        div.innerHTML = h;

      } else if (pg.type === 'chapter') {
        let h = '';
        if (pg.partHeader) {
          h += `<p class="part-header">${pg.partHeader}</p>`;
        }
        const chMatch = pg.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
        let label = '', heading = pg.title;
        if (chMatch) { label = `Chapter ${chMatch[2]}`; heading = chMatch[3]; }
        else if (pg.title.match(/^INTRODUCTION/i)) { label = 'Introduction'; heading = pg.title.replace(/^INTRODUCTION:\s*/i, ''); }

        if (label) h += `<p class="chapter-label">${label}</p>`;
        h += `<h1 class="chapter-title">${heading}</h1><div class="chapter-divider"></div>`;

        pg.content.forEach(p => {
          if (p.startsWith('---') || p.startsWith('Word Count:') || p.startsWith('[End Of') || p.startsWith('End Of Part')) return;
          h += `<p class="book-paragraph">${p}</p>`;
        });
        div.innerHTML = h;
      }

      container.appendChild(div);
    });

    // Initialize StPageFlip
    const size = getBookSize();
    pageFlip = new St.PageFlip(container, {
      width: size.w,
      height: size.h,
      size: 'stretch',
      minWidth: 280,
      maxWidth: 800,
      minHeight: 400,
      maxHeight: 1000,
      drawShadow: true,
      flippingTime: 800,
      usePortrait: true,
      showCover: true,
      maxShadowOpacity: 0.5,
      mobileScrollSupport: false,
      swipeDistance: 120,
      startPage: 0,
      autoSize: true,
      clickEventForward: false,
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.book-page'));

    // Restore bookmark
    const saved = localStorage.getItem(bookmarkKey);
    if (saved) {
      const pg = Math.min(parseInt(saved), totalPages - 1);
      if (pg > 0) pageFlip.turnToPage(pg);
    }

    // Events
    pageFlip.on('flip', (e) => {
      updateUI(e.data);
      localStorage.setItem(bookmarkKey, e.data);
    });

    updateUI(pageFlip.getCurrentPageIndex());

    // Build TOC overlay
    const tocPanel = document.getElementById('tocPanel');
    let tocHtml = '<h3>Contents</h3><ul class="toc-list">';
    tocData.forEach(entry => {
      const chMatch = entry.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
      let num = '', label = entry.title;
      if (chMatch) { num = chMatch[2]; label = chMatch[3]; }
      else if (entry.title.match(/^INTRODUCTION/i)) { label = entry.title.replace(/^INTRODUCTION:\s*/i, 'Introduction: '); }

      if (entry.partHeader) {
        tocHtml += `<li class="part-entry" onclick="goTo(${entry.pageIdx});toggleTOC()"><span class="toc-label">${entry.partHeader}</span></li>`;
      }
      tocHtml += `<li onclick="goTo(${entry.pageIdx});toggleTOC()"><span class="toc-num">${num}</span><span class="toc-label">${label}</span><span class="toc-dots"></span></li>`;
    });
    tocHtml += '</ul>';
    tocPanel.innerHTML = tocHtml;
  });

function updateUI(pageNum) {
  const pct = Math.round((pageNum / (totalPages - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('pageInfo').textContent = `Page ${pageNum + 1} of ${totalPages}`;
}

function flipNext() { if (pageFlip) pageFlip.flipNext(); }
function flipPrev() { if (pageFlip) pageFlip.flipPrev(); }
function goTo(idx) { if (pageFlip) pageFlip.turnToPage(idx); }

function toggleTOC() {
  document.getElementById('tocOverlay').classList.toggle('active');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); flipNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); flipPrev(); }
  if (e.key === 'Escape') { document.getElementById('tocOverlay').classList.remove('active'); }
});

// Custom touch handler: only flip on deliberate HORIZONTAL swipes (not vertical scroll)
let touchStartX = 0, touchStartY = 0;
document.querySelector('.book-area').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.querySelector('.book-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // Only trigger if horizontal movement > 100px AND mostly horizontal (ratio > 2:1)
  if (Math.abs(dx) > 100 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (dx < 0) flipNext();
    else flipPrev();
  }
}, {passive: true});

// Resize handler
window.addEventListener('resize', () => {
  if (pageFlip) pageFlip.update();
});
</script>
</body>
</html>
