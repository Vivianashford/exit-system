<script>
let pageFlip = null;
let totalPages = 0;

// Reader name from URL
const urlParams = new URLSearchParams(window.location.search);
let readerName = urlParams.get('name') || urlParams.get('firstName') || '';
readerName = decodeURIComponent(readerName).trim();
if (readerName) readerName = readerName.charAt(0).toUpperCase() + readerName.slice(1).toLowerCase();
const bookmarkKey = 'transferable-bm' + (readerName ? '-' + readerName.toLowerCase() : '');

// Calculate book size based on viewport

function getBookSize() {
  const area = document.querySelector('.book-area');
  const h = area.clientHeight - 20;
  const w = Math.min(area.clientWidth - 40, h * 0.7); // book ratio ~0.7
  return { w: Math.floor(w), h: Math.floor(h) };
}

fetch('book-content.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    // Filter stubs
    let filtered = data.filter((ch, i) => {
      if (i === 0) return true;
      const words = ch.content.reduce((a, p) => a + p.split(' ').length, 0);
      const isPart = ch.title.toLowerCase().startsWith('part ');
      return isPart || words > 50;
    });

    // Build page data: merge parts into next chapter
    let pageData = [];
    let pendingPart = null;

    // Front cover (premium HTML)
    pageData.push({ type: 'front-cover', hard: true });

    // Title page (premium interior)
    pageData.push({ type: 'title-page', hard: false });

    // Welcome + TOC
    pageData.push({ type: 'welcome-toc' });

    // Chapters
    filtered.slice(1).forEach(ch => {
      const isPart = ch.title.toLowerCase().startsWith('part ');
      if (isPart) {
        pendingPart = ch.title;
      } else {
        pageData.push({ type: 'chapter', title: ch.title, content: ch.content, partHeader: pendingPart });
        pendingPart = null;
      }
    });

    // Back cover
    pageData.push({ type: 'cover', src: 'book-back-cover.png', hard: true });

    totalPages = pageData.length;

    // Build TOC data for overlay
    const tocData = [];
    pageData.forEach((p, idx) => {
      if (p.type === 'chapter') {
        tocData.push({ title: p.title, pageIdx: idx, partHeader: p.partHeader });
      }
    });

    // Create HTML pages
    const container = document.getElementById('bookContainer');
    pageData.forEach((pg, idx) => {
      const div = document.createElement('div');
      div.className = 'book-page' + (pg.hard ? ' hard' : '');
      if (pg.hard) div.setAttribute('data-density', 'hard');

      if (pg.type === 'front-cover') {
        div.classList.add('front-cover');
        div.innerHTML = `<div class="fc-inner">
          <p class="fc-author-top">Jean Louis Hardy</p>
          <div class="fc-center">
            <div class="fc-big-t">T</div>
            <p class="fc-tagline"><span class="plus">+</span>Valuable You Are</p>
            <p class="fc-tagline"><span class="minus">&minus;</span>Valuable Your Business</p>
          </div>
          <div class="fc-bottom">
            <div class="fc-rule"></div>
            <h1 class="fc-title">Transferable</h1>
            <p class="fc-imprint">Arena Partners</p>
          </div>
        </div>`;

      } else if (pg.type === 'cover') {
        div.classList.add('front-cover','back-cover');
        div.innerHTML = `<div class="fc-inner bc-inner">
          <p class="bc-quote">"If you disappeared tomorrow, what would happen to your business by Friday?"</p>
          <div class="bc-rule"></div>
          <p class="bc-body">You built this company from nothing. Every client relationship, every late night, every risk you took with your own name on the line. But here's the truth most founders don't want to hear:</p>
          <p class="bc-body bc-bold">The more valuable you are to your business, the less valuable your business is.</p>
          <p class="bc-body">TRANSFERABLE is the playbook for owners who want to protect what they've built - and exit at the premium they've earned. Inside, you'll discover the exact system used by founders who turned owner-dependent operations into businesses that buyers compete for.</p>
          <div class="bc-features">
            <p class="bc-feature">The 6 Deal-Killers that destroy valuations</p>
            <p class="bc-feature">The Transferable Method (4 phases, 27 deliverables)</p>
            <p class="bc-feature">How to increase your multiple by 2-4x</p>
            <p class="bc-feature">Real case studies from $5M-$50M exits</p>
          </div>
          <div class="bc-rule"></div>
          <div class="bc-bottom">
            <p class="bc-author">Jean Louis Hardy</p>
            <p class="bc-author-sub">Founder, The Arena Partners</p>
            <p class="bc-imprint">thearenapartners.com</p>
          </div>
        </div>`;

      } else if (pg.type === 'title-page') {
        div.innerHTML = `<div class="page-scroll-area"><div class="title-page-inner">
          <p class="tp-author-top">Jean Louis Hardy</p>
          <div class="tp-big-t">T</div>
          <h1 class="tp-title">Transferable</h1>
          <p class="tp-subtitle">Why the best operators own the least valuable businesses - and how to make sure you're not one of them.</p>
          <div class="tp-rule"></div>
          <p class="tp-author">Jean Louis Hardy</p>
          <p class="tp-imprint">The Arena Partners</p>
        </div></div>`;

      } else if (pg.type === 'welcome-toc') {
        div.classList.add('welcome-toc');
        let h = '<div class="page-scroll-area">';
        if (readerName) {
          h += `<div class="welcome-header">
            <p class="ded-to">For You</p>
            <p class="ded-name">${readerName},</p>
            <p class="ded-msg">I wrote this book because I watched too many great builders lose what they earned. I hope it helps you protect yours.</p>
            <p class="ded-sig">Jean Louis Hardy</p>
            <p class="ded-role">Founder, The Arena Partners</p>
          </div>`;
        } else {
          h += `<div class="welcome-header">
            <p class="ded-to">Welcome</p>
            <p class="ded-name" style="font-size:20px;">TRANSFERABLE</p>
            <p class="ded-msg">Why the best operators own the least valuable businesses.</p>
            <p class="ded-sig">Jean Louis Hardy</p>
            <p class="ded-role">Founder, The Arena Partners</p>
          </div>`;
        }

        h += '<p class="toc-section-title">Contents</p><ul class="toc-list">';
        tocData.forEach(entry => {
          const chMatch = entry.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
          let num = '', label = entry.title;
          if (chMatch) { num = chMatch[2]; label = chMatch[3]; }
          else if (entry.title.match(/^INTRODUCTION/i)) { label = entry.title.replace(/^INTRODUCTION:\s*/i, 'Introduction: '); }

          if (entry.partHeader) {
            h += `<li class="part-entry" onclick="goTo(${entry.pageIdx})"><span class="toc-label">${entry.partHeader}</span></li>`;
          }
          h += `<li onclick="goTo(${entry.pageIdx})"><span class="toc-num">${num}</span><span class="toc-label">${label}</span><span class="toc-dots"></span></li>`;
        });
        h += '</ul></div>';
        div.innerHTML = h;

      } else if (pg.type === 'chapter') {
        let h = '<div class="page-scroll-area">';
        if (pg.partHeader) {
          h += `<p class="part-header">${pg.partHeader}</p>`;
        }
        const chMatch = pg.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
        let label = '', heading = pg.title;
        if (chMatch) { label = `Chapter ${chMatch[2]}`; heading = chMatch[3]; }
        else if (pg.title.match(/^INTRODUCTION/i)) { label = 'Introduction'; heading = pg.title.replace(/^INTRODUCTION:\s*/i, ''); }

        if (label) h += `<p class="chapter-label">${label}</p>`;
        h += `<h1 class="chapter-title">${heading}</h1><div class="chapter-divider"></div>`;

        pg.content.forEach(p => {
          if (p.startsWith('---') || p.startsWith('Word Count:') || p.startsWith('[End Of') || p.startsWith('End Of Part')) return;
          h += `<p class="book-paragraph">${p}</p>`;
        });
        h += '</div>';
        div.innerHTML = h;
      }

      container.appendChild(div);
    });

    // Initialize StPageFlip
    const size = getBookSize();
    pageFlip = new St.PageFlip(container, {
      width: size.w,
      height: size.h,
      size: 'stretch',
      minWidth: 280,
      maxWidth: 800,
      minHeight: 400,
      maxHeight: 1000,
      drawShadow: true,
      flippingTime: 800,
      usePortrait: true,
      showCover: true,
      maxShadowOpacity: 0.5,
      mobileScrollSupport: false,
      swipeDistance: 120,
      startPage: 0,
      autoSize: true,
      clickEventForward: false,
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.book-page'));

    // Restore bookmark
    const saved = localStorage.getItem(bookmarkKey);
    if (saved) {
      const pg = Math.min(parseInt(saved), totalPages - 1);
      if (pg > 0) pageFlip.turnToPage(pg);
    }

    // Events
    pageFlip.on('flip', (e) => {
      updateUI(e.data);
      localStorage.setItem(bookmarkKey, e.data);
    });

    updateUI(pageFlip.getCurrentPageIndex());

    // Scroll-to-bottom detection: shake next arrow when reader finishes a page
    function attachScrollWatchers() {
      document.querySelectorAll('.page-scroll-area').forEach(area => {
        if (area._scrollWatched) return;
        area._scrollWatched = true;
        area.addEventListener('scroll', () => {
          const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 30;
          const nextBtn = document.getElementById('nextArrow');
          if (atBottom && nextBtn && !nextBtn.disabled && !nextBtn.classList.contains('pulse')) {
            nextBtn.classList.add('pulse');
            nextBtn.addEventListener('animationend', () => nextBtn.classList.remove('pulse'), {once: true});
          }
        }, {passive: true});
      });
    }
    pageFlip.on('flip', () => setTimeout(attachScrollWatchers, 200));
    setTimeout(attachScrollWatchers, 300);

    // Build TOC overlay
    const tocPanel = document.getElementById('tocPanel');
    let tocHtml = '<h3>Contents</h3><ul class="toc-list">';
    tocData.forEach(entry => {
      const chMatch = entry.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
      let num = '', label = entry.title;
      if (chMatch) { num = chMatch[2]; label = chMatch[3]; }
      else if (entry.title.match(/^INTRODUCTION/i)) { label = entry.title.replace(/^INTRODUCTION:\s*/i, 'Introduction: '); }

      if (entry.partHeader) {
        tocHtml += `<li class="part-entry" onclick="goTo(${entry.pageIdx});toggleTOC()"><span class="toc-label">${entry.partHeader}</span></li>`;
      }
      tocHtml += `<li onclick="goTo(${entry.pageIdx});toggleTOC()"><span class="toc-num">${num}</span><span class="toc-label">${label}</span><span class="toc-dots"></span></li>`;
    });
    tocHtml += '</ul>';
    tocPanel.innerHTML = tocHtml;
  });

function updateUI(pageNum) {
  const pct = Math.round((pageNum / (totalPages - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('pageInfo').textContent = `Page ${pageNum + 1} of ${totalPages}`;
  document.getElementById('prevArrow').disabled = pageNum === 0;
  document.getElementById('nextArrow').disabled = pageNum === totalPages - 1;
}

function flipNext() { if (pageFlip) pageFlip.flipNext(); }
function flipPrev() { if (pageFlip) pageFlip.flipPrev(); }
function goTo(idx) { if (pageFlip) pageFlip.turnToPage(idx); }

function toggleTOC() {
  document.getElementById('tocOverlay').classList.toggle('active');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); flipNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); flipPrev(); }
  if (e.key === 'Escape') { document.getElementById('tocOverlay').classList.remove('active'); }
});

// Block ALL StPageFlip touch/mouse drag - only bottom arrows turn pages
document.addEventListener('touchstart', e => {
  const bookArea = e.target.closest('.book-area');
  if (bookArea && !e.target.closest('.arrow-btn')) {
    e.stopPropagation();
  }
}, {capture: true});

document.addEventListener('mousedown', e => {
  const bookArea = e.target.closest('.book-area');
  if (bookArea && !e.target.closest('.arrow-btn')) {
    e.stopPropagation();
  }
}, {capture: true});

// Resize handler
window.addEventListener('resize', () => {
  if (pageFlip) pageFlip.update();
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}</script>
</body>
</html>
