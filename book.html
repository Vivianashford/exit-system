<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF7F0;--paper:#F5F1EA;--ink:#1a1a1a;--ink-light:#4a4540;
  --gold:#B8943E;--gold-dark:#96782E;--gold-light:#D4B96A;
  --spine:#2a2420;--page-shadow:rgba(0,0,0,0.08);
  --reading-width:680px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Source Serif 4',Georgia,serif;
  background:#E8E4DE;color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;height:100vh;
}

/* -- Book Shell -- */
.book-shell{display:flex;flex-direction:column;height:100vh;background:#E8E4DE}

/* -- Top Bar -- */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--spine);
  border-bottom:2px solid var(--gold-dark);flex-shrink:0;z-index:100;
}
.top-bar .book-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.top-bar .author{font-family:'DM Sans',sans-serif;font-size:12px;color:#8a8078;letter-spacing:0.5px}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{width:120px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease}
.progress-pct{font-family:'DM Sans',sans-serif;font-size:11px;color:#6a6560}
.font-controls{display:flex;align-items:center;gap:8px}
.font-btn{width:28px;height:28px;border-radius:4px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#8a8078;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-weight:600}
.font-btn:hover{background:rgba(255,255,255,0.15);color:var(--gold)}

/* -- Page Area -- */
.page-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}

/* -- The Book -- */
.book{width:100%;max-width:var(--reading-width);height:100%;max-height:880px;position:relative;perspective:2500px}

/* -- Page -- */
.page{
  position:absolute;inset:0;background:var(--paper);
  border-radius:2px 8px 8px 2px;
  padding:48px 56px 60px 56px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(184,148,62,0.2) transparent;
}
.page::-webkit-scrollbar{width:4px}
.page::-webkit-scrollbar-track{background:transparent}
.page::-webkit-scrollbar-thumb{background:rgba(184,148,62,0.25);border-radius:2px}

/* Spine shadow */
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to right,rgba(0,0,0,0.06),transparent);z-index:2}

/* Paper texture */
.page::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  border-radius:inherit;z-index:1;
}

/* Page shadow when settled */
.page.settled{
  box-shadow:4px 4px 20px var(--page-shadow),1px 0 0 rgba(0,0,0,0.05),inset -2px 0 8px rgba(0,0,0,0.02);
}

/* -- Page Flip Keyframes -- */
@keyframes flipForwardOut {
  0%   { transform:rotateY(0deg);    box-shadow:4px 4px 20px rgba(0,0,0,0.08); }
  30%  { transform:rotateY(-40deg);  box-shadow:-10px 4px 30px rgba(0,0,0,0.15); }
  100% { transform:rotateY(-110deg); box-shadow:-2px 0 8px rgba(0,0,0,0.05); opacity:0; }
}
@keyframes flipForwardIn {
  0%   { transform:rotateY(110deg);  opacity:0; }
  50%  { transform:rotateY(30deg);   opacity:1; box-shadow:10px 4px 25px rgba(0,0,0,0.12); }
  100% { transform:rotateY(0deg);    box-shadow:4px 4px 20px rgba(0,0,0,0.08); }
}
@keyframes flipBackwardOut {
  0%   { transform:rotateY(0deg);    box-shadow:4px 4px 20px rgba(0,0,0,0.08); }
  30%  { transform:rotateY(40deg);   box-shadow:10px 4px 30px rgba(0,0,0,0.15); }
  100% { transform:rotateY(110deg);  box-shadow:2px 0 8px rgba(0,0,0,0.05); opacity:0; }
}
@keyframes flipBackwardIn {
  0%   { transform:rotateY(-110deg); opacity:0; }
  50%  { transform:rotateY(-30deg);  opacity:1; box-shadow:-10px 4px 25px rgba(0,0,0,0.12); }
  100% { transform:rotateY(0deg);    box-shadow:4px 4px 20px rgba(0,0,0,0.08); }
}

.page.flip-fwd-out{
  transform-origin:left center;
  animation:flipForwardOut 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
}
.page.flip-fwd-in{
  transform-origin:right center;
  animation:flipForwardIn 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
}
.page.flip-bwd-out{
  transform-origin:right center;
  animation:flipBackwardOut 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
}
.page.flip-bwd-in{
  transform-origin:left center;
  animation:flipBackwardIn 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
}

/* -- Typography -- */
.page-content{position:relative;z-index:3;user-select:text;-webkit-user-select:text}
.chapter-label{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:600}
.chapter-title{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,36px);font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:32px}
.chapter-divider{width:60px;height:2px;background:var(--gold);margin:0 0 32px;border-radius:1px}
.book-paragraph{font-size:17px;line-height:1.85;color:var(--ink-light);margin-bottom:18px;text-align:justify;hyphens:auto;-webkit-hyphens:auto}
.book-paragraph:first-of-type::first-letter{font-family:'Playfair Display',serif;font-size:3.2em;float:left;line-height:0.8;margin:4px 10px 0 0;color:var(--gold-dark);font-weight:700}

/* -- Welcome + TOC Page -- */
.welcome-page{height:100%;display:flex;flex-direction:column}
.welcome-header{text-align:center;padding-bottom:24px;border-bottom:1px solid rgba(0,0,0,0.06);margin-bottom:20px}
.welcome-header .ded-to{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:600}
.welcome-header .ded-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);margin-bottom:12px}
.welcome-header .ded-message{font-family:'Source Serif 4',serif;font-size:15px;line-height:1.7;color:var(--ink-light);font-style:italic;max-width:400px;margin:0 auto 12px}
.welcome-header .ded-sig{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--ink);margin-bottom:2px}
.welcome-header .ded-role{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink-light)}

/* TOC in welcome page */
.toc-inline{flex:1;overflow-y:auto}
.toc-inline h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin-bottom:14px;font-weight:700}
.toc-list{list-style:none;padding:0}
.toc-list li{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;transition:color 0.15s}
.toc-list li:hover{color:var(--gold-dark)}
.toc-list li:last-child{border-bottom:none}
.toc-list .toc-num{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gold);min-width:24px;font-weight:600}
.toc-list .toc-label{font-size:14px;color:var(--ink-light);line-height:1.4;flex:1}
.toc-list .toc-dots{flex:1;border-bottom:1px dotted rgba(0,0,0,0.1);min-width:20px;margin:0 8px;align-self:center}
.toc-list .toc-pg{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gold);font-weight:500}
.toc-list li.part-entry{margin-top:12px}
.toc-list li.part-entry .toc-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--ink)}

/* Cover pages */
.cover-page{position:absolute;inset:0;overflow:hidden}
.cover-page img{width:100%;height:100%;object-fit:cover}

/* Part divider */
.part-page{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%}
.part-page .part-label{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:600}
.part-page h2{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,40px);font-weight:700;color:var(--ink);line-height:1.2}

/* -- Chapter Nav Bar (top of reader) -- */
.chapter-bar{
  display:flex;gap:4px;overflow-x:auto;padding:2px 0 8px;margin-bottom:4px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.chapter-bar::-webkit-scrollbar{display:none}
.chapter-bar .cb-item{
  flex-shrink:0;padding:4px 10px;border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  color:var(--ink-light);cursor:pointer;transition:all 0.15s;
  white-space:nowrap;background:rgba(0,0,0,0.03);border:1px solid transparent;
}
.chapter-bar .cb-item:hover{background:rgba(184,148,62,0.08);color:var(--gold-dark)}
.chapter-bar .cb-item.active{background:rgba(184,148,62,0.12);color:var(--gold-dark);border-color:rgba(184,148,62,0.2);font-weight:600}
.chapter-bar .cb-item.part{font-weight:600;color:var(--ink)}

/* -- Nav Buttons -- */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:80px;background:rgba(42,36,32,0.06);
  border:none;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;z-index:50;opacity:1;
}
.nav-btn.hidden{opacity:0;pointer-events:none}
.nav-btn:hover{background:rgba(42,36,32,0.12)}
.nav-btn svg{width:20px;height:20px;stroke:var(--ink-light);fill:none;stroke-width:2}
.nav-prev{left:8px}
.nav-next{right:8px}
.nav-btn:disabled{opacity:0.2;cursor:default}

/* -- Bottom Bar -- */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;background:var(--spine);
  border-top:1px solid rgba(184,148,62,0.15);flex-shrink:0;
}
.page-num{font-family:'DM Sans',sans-serif;font-size:12px;color:#6a6560}
.chapter-nav{font-family:'DM Sans',sans-serif;font-size:12px;color:#8a8078;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.chapter-nav:hover{color:var(--gold)}
.chapter-nav svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* -- Responsive -- */
@media(max-width:768px){
  .page{padding:32px 28px 48px 28px;border-radius:0}
  .book-paragraph{font-size:16px;line-height:1.8;text-align:left}
  .nav-btn{width:36px;height:60px}.nav-prev{left:4px}.nav-next{right:4px}
  .page-area{padding:8px}
  .top-bar{padding:10px 16px}.bottom-bar{padding:8px 16px}
  .progress-bar{width:80px}
  .welcome-header .ded-name{font-size:22px}
}
@media(max-width:480px){
  .page{padding:24px 20px 40px 20px}
  .book-paragraph{font-size:15px}
  .chapter-title{font-size:24px}
}
</style>
</head>
<body>

<div class="book-shell">
  <div class="top-bar">
    <div>
      <div class="book-title">Transferable</div>
      <div class="author">Jean Louis Hardy</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="font-controls">
        <button class="font-btn" onclick="adjustFont(-1)">A-</button>
        <button class="font-btn" onclick="adjustFont(1)">A+</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </div>
  </div>

  <div class="page-area">
    <button class="nav-btn nav-prev" id="prevBtn" onclick="prevPage()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="book">
      <div class="page settled" id="pageEl">
        <div class="page-content" id="pageContent"></div>
      </div>
    </div>
    <button class="nav-btn nav-next" id="nextBtn" onclick="nextPage()">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="bottom-bar">
    <span class="page-num" id="pageNum">Page 1</span>
    <div class="chapter-nav" id="chapterLabel">Contents</div>
  </div>
</div>

<script>
let chapters = [];
let currentPage = 0;
let fontSize = 17;
let isFlipping = false;
let readerName = '';
const STORAGE_KEY = 'transferable-bookmark';

// Pull reader name from URL
const urlParams = new URLSearchParams(window.location.search);
readerName = urlParams.get('name') || urlParams.get('firstName') || urlParams.get('first') || '';
readerName = decodeURIComponent(readerName).trim();
if (readerName) readerName = readerName.charAt(0).toUpperCase() + readerName.slice(1).toLowerCase();
const bookmarkKey = readerName ? STORAGE_KEY + '-' + readerName.toLowerCase() : STORAGE_KEY;

fetch('book-content.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    // Filter stubs, keep parts only as markers (they'll be merged into next chapter)
    let filtered = data.filter((ch, i) => {
      if (i === 0) return true;
      const words = ch.content.reduce((a, p) => a + p.split(' ').length, 0);
      const isPart = ch.title.toLowerCase().startsWith('part ');
      // Keep parts (they get merged) and chapters with real content
      return isPart || words > 50;
    });

    // Build pages: [cover, welcome+toc, ...chapters, backcover]
    let pages = [];

    // Page 0: Front cover
    pages.push({ type: 'cover', src: 'book-cover.png' });

    // Page 1: Welcome (dedication) + TOC (will be populated after pages are built)
    pages.push({ type: 'welcome-toc', tocEntries: [] });

    // Pages 2+: All chapters (ALL part entries merge into the next chapter, never standalone)
    let pendingPart = null;
    filtered.slice(1).forEach(ch => {
      const isPart = ch.title.toLowerCase().startsWith('part ');
      if (isPart) {
        pendingPart = ch.title;
      } else {
        pages.push({ type: 'chapter', title: ch.title, content: ch.content, partHeader: pendingPart || null });
        pendingPart = null;
      }
    });

    // Build TOC entries from actual pages (not raw data)
    pages.forEach((p, idx) => {
      if (p.type === 'chapter') {
        pages[1].tocEntries.push({ title: p.title, pageIdx: idx, partHeader: p.partHeader });
      }
    });

    // Last page: Back cover
    pages.push({ type: 'cover', src: 'book-back-cover.png' });

    chapters = pages;

    const saved = localStorage.getItem(bookmarkKey);
    if (saved) currentPage = Math.min(parseInt(saved), chapters.length - 1);

    renderPage();
  });

function renderPage() {
  const el = document.getElementById('pageContent');
  const pg = chapters[currentPage];
  if (!pg) return;

  let html = '';

  if (pg.type === 'cover') {
    html = `<div class="cover-page"><img src="${pg.src}" alt="Book Cover"></div>`;
    el.parentElement.style.padding = '0';
  } else {
    el.parentElement.style.padding = '';

    if (pg.type === 'welcome-toc') {
      // Build chapter nav bar from actual pages
      let barHtml = '<div class="chapter-bar" id="chapterBar">';
      pg.tocEntries.forEach(entry => {
        const t = entry.title;
        const chMatch = t.match(/^(CHAPTER|Chapter)\s+(\d+)/i);
        let label = chMatch ? 'Ch.' + chMatch[2] : t.substring(0,15);
        let cls = 'cb-item';
        if (entry.partHeader) {
          barHtml += `<span class="cb-item part" onclick="goToPage(${entry.pageIdx})">${entry.partHeader.split(':')[0].trim()}</span>`;
        }
        barHtml += `<span class="${cls}" onclick="goToPage(${entry.pageIdx})">${label}</span>`;
      });
      barHtml += '</div>';

      // Welcome section
      let welcomeHtml = '';
      if (readerName) {
        welcomeHtml = `<div class="welcome-header">
          <p class="ded-to">For You</p>
          <p class="ded-name">${readerName},</p>
          <p class="ded-message">I wrote this book because I watched too many great builders lose what they earned. I hope it helps you protect yours.</p>
          <p class="ded-sig">Jean Louis Hardy</p>
          <p class="ded-role">Founder, The Arena Partners</p>
        </div>`;
      } else {
        welcomeHtml = `<div class="welcome-header">
          <p class="ded-to">Welcome</p>
          <p class="ded-name" style="font-size:22px;">TRANSFERABLE</p>
          <p class="ded-message">Why the best operators own the least valuable businesses.</p>
          <p class="ded-sig">Jean Louis Hardy</p>
          <p class="ded-role">Founder, The Arena Partners</p>
        </div>`;
      }

      // TOC - built from actual page indices
      let tocHtml = '<div class="toc-inline"><h3>Contents</h3><ul class="toc-list">';
      pg.tocEntries.forEach(entry => {
        const t = entry.title;
        const chMatch = t.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
        let num = '', label = t;
        if (chMatch) { num = chMatch[2]; label = chMatch[3]; }
        else if (t.match(/^INTRODUCTION/i)) { num = ''; label = t.replace(/^INTRODUCTION:\s*/i, 'Introduction: '); }
        else if (t.match(/^Author/i)) { num = ''; label = t; }

        // Show part header above the chapter entry
        if (entry.partHeader) {
          tocHtml += `<li class="part-entry" onclick="goToPage(${entry.pageIdx})"><span class="toc-label">${entry.partHeader}</span></li>`;
        }
        tocHtml += `<li onclick="goToPage(${entry.pageIdx})"><span class="toc-num">${num}</span><span class="toc-label">${label}</span><span class="toc-dots"></span><span class="toc-pg">${entry.pageIdx}</span></li>`;
      });
      tocHtml += '</ul></div>';

      html = barHtml + welcomeHtml + tocHtml;

    } else if (pg.type === 'chapter') {
      let label = '', heading = pg.title;
      const chMatch = pg.title.match(/^(CHAPTER|Chapter)\s+(\d+)\s*:\s*(.*)/i);
      if (chMatch) { label = `Chapter ${chMatch[2]}`; heading = chMatch[3]; }
      else if (pg.title.match(/^INTRODUCTION/i)) { label = 'Introduction'; heading = pg.title.replace(/^INTRODUCTION:\s*/i, ''); }
      else if (pg.title.match(/^Author/i)) { label = ''; heading = pg.title; }

      // Chapter bar at top
      let barHtml = '<div class="chapter-bar" id="chapterBar">';
      let ci = 2;
      chapters.forEach((c, idx) => {
        if (idx < 2 || idx >= chapters.length - 1) return;
        const ct = c.title || '';
        const ip = ct.toLowerCase().startsWith('part ');
        const cm = ct.match(/^(CHAPTER|Chapter)\s+(\d+)/i);
        let lb = ip ? ct.split(':')[0].trim() : (cm ? 'Ch.' + cm[2] : ct.substring(0,15));
        let cls = 'cb-item' + (ip ? ' part' : '') + (idx === currentPage ? ' active' : '');
        barHtml += `<span class="${cls}" onclick="goToPage(${idx})">${lb}</span>`;
      });
      barHtml += '</div>';

      html = barHtml;
      if (pg.partHeader) {
        const parts = pg.partHeader.split(':');
        html += `<p class="chapter-label" style="margin-bottom:4px;font-size:10px;letter-spacing:4px;">${parts[0].trim()}</p>`;
        if (parts.length > 1) html += `<p style="font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);font-weight:700;margin-bottom:20px;">${parts.slice(1).join(':').trim()}</p>`;
        html += `<div class="chapter-divider" style="margin-bottom:24px;"></div>`;
      }
      html += `${label ? `<p class="chapter-label">${label}</p>` : ''}<h1 class="chapter-title">${heading}</h1><div class="chapter-divider"></div>`;
      pg.content.forEach(p => {
        if (p.startsWith('---') || p.startsWith('Word Count:') || p.startsWith('[End Of') || p.startsWith('End Of Part')) return;
        html += `<p class="book-paragraph">${p}</p>`;
      });
    }
  }

  el.innerHTML = html;
  document.getElementById('pageEl').scrollTop = 0;
  updateUI();
  localStorage.setItem(bookmarkKey, currentPage);
}

function updateUI() {
  const pct = Math.round((currentPage / (chapters.length - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('pageNum').textContent = `Page ${currentPage + 1} of ${chapters.length}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === chapters.length - 1;

  const pg = chapters[currentPage];
  if (pg && pg.title) {
    const cm = pg.title.match(/^(CHAPTER|Chapter)\s+(\d+)/i);
    document.getElementById('chapterLabel').textContent = cm ? `Ch. ${cm[2]}` : (pg.type === 'cover' ? 'Cover' : 'Contents');
  }
}

function flipPage(direction) {
  if (isFlipping) return;
  if (direction === 'forward' && currentPage >= chapters.length - 1) return;
  if (direction === 'backward' && currentPage <= 0) return;
  isFlipping = true;

  const page = document.getElementById('pageEl');
  const outClass = direction === 'forward' ? 'flip-fwd-out' : 'flip-bwd-out';
  const inClass = direction === 'forward' ? 'flip-fwd-in' : 'flip-bwd-in';

  page.classList.remove('settled');
  page.classList.add(outClass);

  setTimeout(() => {
    currentPage += direction === 'forward' ? 1 : -1;
    renderPage();
    page.classList.remove(outClass);
    page.classList.add(inClass);

    page.addEventListener('animationend', function handler() {
      page.removeEventListener('animationend', handler);
      page.classList.remove(inClass);
      page.classList.add('settled');
      isFlipping = false;
    });
  }, 320);
}

function nextPage() { flipPage('forward'); }
function prevPage() { flipPage('backward'); }

function goToPage(i) {
  if (isFlipping) return;
  currentPage = i;
  const page = document.getElementById('pageEl');
  page.classList.remove('flip-fwd-out','flip-fwd-in','flip-bwd-out','flip-bwd-in');
  page.classList.add('settled');
  renderPage();
}

function adjustFont(delta) {
  fontSize = Math.max(14, Math.min(22, fontSize + delta));
  document.querySelectorAll('.book-paragraph').forEach(p => p.style.fontSize = fontSize + 'px');
}

// Hide arrows on scroll
let scrollTimer;
document.getElementById('pageEl').addEventListener('scroll', () => {
  document.getElementById('prevBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    document.getElementById('prevBtn').classList.remove('hidden');
    document.getElementById('nextBtn').classList.remove('hidden');
  }, 1200);
}, {passive:true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) { diff < 0 ? nextPage() : prevPage(); }
}, {passive:true});
</script>
</body>
